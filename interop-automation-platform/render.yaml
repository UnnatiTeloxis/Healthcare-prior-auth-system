# Render Blueprint — single Web Service (UI + API + Inferno validator)
# Root Directory: interop-automation-platform (or use repo-root render.yaml)

services:
  - type: web
    name: interop-platform
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: API_DEBUG
        value: "false"
      - key: API_RELOAD
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: FHIR_PACKAGES_PATH
        value: /app/fhir_packages
      - key: INFERNO_VALIDATOR_URL
        value: http://127.0.0.1:4567
      - key: TERMINOLOGY_SERVER_URL
        value: https://tx.fhir.org/r4
      - key: DEFAULT_IGS
        value: hl7.fhir.us.core#6.1.0
      - key: TX_SERVER_URL
        value: https://tx.fhir.org/r4
      - key: DISPLAY_ISSUES_ARE_WARNINGS
        value: "true"
