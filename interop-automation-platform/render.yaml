# Render Blueprint — Interop Automation Platform (FHIR Validator)
# Deploy: Render Dashboard → New + → Blueprint → connect this repo
# If the repo root is the parent folder, set Root Directory to: interop-automation-platform

services:
  - type: web
    name: fhir-validator-backend
    runtime: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "8000"
      - key: API_DEBUG
        value: "false"
      - key: API_RELOAD
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: TERMINOLOGY_SERVER_URL
        value: https://tx.fhir.org/r4
      - key: DEFAULT_IGS
        value: hl7.fhir.us.core#6.1.0
      - key: DATABASE_URL
        fromDatabase:
          name: fhir-validator-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fhir-validator-redis
          type: redis
          property: connectionString
      # Required for live FHIR validation — point to a reachable Inferno wrapper URL
      - key: INFERNO_VALIDATOR_URL
        sync: false

  - type: redis
    name: fhir-validator-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys_lru
    ipAllowList: []

  - type: web
    name: fhir-validator-frontend
    runtime: docker
    region: oregon
    plan: free
    dockerContext: ./frontend
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: VITE_API_BASE_URL
        value: /api/v1

databases:
  - name: fhir-validator-db
    region: oregon
    plan: free
    databaseName: interop
    user: interop
