services:
  fhir-validator-wrapper:
    image: infernocommunity/fhir-validator-service:latest
    container_name: interop_fhir_validator_wrapper
    ports:
      - "4567:4567"
    environment:
      # Local: skip remote TX — tx.fhir.org is often unreachable and crashes Inferno init.
      # Structural + profile validation still runs (same as Inferno `-tx n/a`).
      DISABLE_TX: "true"
      DISPLAY_ISSUES_ARE_WARNINGS: "true"
    volumes:
      # Mount US Core into Inferno auto-load folder (do NOT replace entire /home/igs).
      - ./backend/fhir_packages/us-core.tgz:/home/igs/us-core.tgz:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/version"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - interop_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: interop_postgres
    environment:
      POSTGRES_USER: interop
      POSTGRES_PASSWORD: interop123
      POSTGRES_DB: interop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interop -d interop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interop_network

  redis:
    image: redis:7-alpine
    container_name: interop_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interop_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://interop:interop123@postgres:5432/interop
      REDIS_URL: redis://redis:6379
      INFERNO_VALIDATOR_URL: http://fhir-validator-wrapper:4567
      FHIR_PACKAGES_PATH: /app/fhir_packages
      DEFAULT_IGS: hl7.fhir.us.core#6.1.0
      CORS_ORIGINS: "*"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - ./frontend/public:/app/frontend/public:ro
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fhir-validator-wrapper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - interop_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interop_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - interop_network

networks:
  interop_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
