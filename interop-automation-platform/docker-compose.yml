services:
  fhir-validator-wrapper:
    image: infernocommunity/fhir-validator-service:latest
    container_name: interop_fhir_validator_wrapper
    ports:
      - "4567:4567"
    environment:
      # Match hosted Inferno (inferno.healthit.gov/validator) for result parity.
      DISPLAY_ISSUES_ARE_WARNINGS: "true"
      # Hosted Inferno uses http://tx.fhir.org/r4 (see OperationOutcome diagnostics).
      TX_SERVER_URL: "http://tx.fhir.org/r4"
      # Do not set DISABLE_TX — its presence turns off terminology validation.
      # Keep validator sessions alive so installed IGs stay loaded between requests.
      SESSION_CACHE_DURATION: "-1"
      # Online mode enabled — allows downloading IGs from packages.fhir.org on-demand
      JAVA_TOOL_OPTIONS: "-Xmx4g"
    volumes:
      # Fast startup: do not auto-load IGs at Inferno boot (backend preloads on demand).
      - ./backend/fhir_packages/empty:/home/igs:ro
      # IG packages on D: (download via scripts/download-igs.ps1)
      - D:/fhir_packages:/app/igs:ro
      # Persist downloaded dependency packages across container restarts.
      - fhir_validator_cache:/home/ktor/.fhir
    healthcheck:
      # /profiles returns 503 until the validation engine is fully initialized (and may never
      # succeed when terminology is unreachable). /version confirms the service is up.
      test: ["CMD", "curl", "-f", "http://localhost:4567/version"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 180s
    networks:
      - interop_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: interop_postgres
    environment:
      POSTGRES_USER: interop
      POSTGRES_PASSWORD: interop123
      POSTGRES_DB: interop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interop -d interop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interop_network

  redis:
    image: redis:7-alpine
    container_name: interop_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interop_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://interop:interop123@postgres:5432/interop
      REDIS_URL: redis://redis:6379
      INFERNO_VALIDATOR_URL: http://fhir-validator-wrapper:4567
      FHIR_PACKAGES_PATH: /app/fhir_packages
      # false: keep API responsive; IGs load on demand when selected in the UI
      PRELOAD_ALL_LOCAL_IGS: "false"
      PREFER_LOCAL_IG_UPLOAD: "true"
      DEFAULT_IGS: hl7.fhir.us.core#6.1.0
      CORS_ORIGINS: "*"
      PYTHONUNBUFFERED: "1"
      # Avoid watchfiles I/O crashes on Windows Docker bind mounts (uvicorn --reload).
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - D:/fhir_packages:/app/fhir_packages:ro
      - ./frontend/public:/app/frontend/public:ro
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fhir-validator-wrapper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - interop_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interop_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - interop_network

networks:
  interop_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  fhir_validator_cache:
