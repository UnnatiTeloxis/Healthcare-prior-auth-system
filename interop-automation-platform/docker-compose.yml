services:
  postgres:
    image: postgres:15-alpine
    container_name: interop_postgres
    environment:
      POSTGRES_USER: interop
      POSTGRES_PASSWORD: interop123
      POSTGRES_DB: interop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interop -d interop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interop_network

  redis:
    image: redis:7-alpine
    container_name: interop_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interop_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://interop:interop123@postgres:5432/interop
      REDIS_URL: redis://redis:6379
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - interop_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interop_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - interop_network

networks:
  interop_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
