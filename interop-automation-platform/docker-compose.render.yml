# Simplified production stack for Render-style Docker deployment (backend + frontend only).
# For full FHIR validation locally, use docker-compose.yml (includes Inferno wrapper).
#
# Usage:
#   docker compose -f docker-compose.render.yml --env-file .env.production up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.render
    container_name: fhir-backend-render
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      API_DEBUG: "false"
      API_RELOAD: "false"
      CORS_ORIGINS: "*"
      DATABASE_URL: ${DATABASE_URL:-postgresql://interop:interop123@postgres:5432/interop}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      INFERNO_VALIDATOR_URL: ${INFERNO_VALIDATOR_URL:-http://fhir-validator-wrapper:4567}
      TERMINOLOGY_SERVER_URL: ${TERMINOLOGY_SERVER_URL:-https://tx.fhir.org/r4}
      DEFAULT_IGS: ${DEFAULT_IGS:-hl7.fhir.us.core#6.1.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.render
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: fhir-frontend-render
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
